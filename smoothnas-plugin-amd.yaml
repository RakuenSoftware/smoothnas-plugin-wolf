# SmoothNAS plugin manifest for Games-on-Whales Wolf (AMD variant).

apiVersion: smoothnas.io/v1
kind: Plugin

metadata:
  name: wolf
  version: 0.2.0 # x-release-please-version
  description: |
    Games-on-Whales Wolf game streaming host for Moonlight clients
    with AMD GPU access through /dev/dri.
  vendor: smoothnas
  homepage: https://github.com/RakuenSoftware/smoothnas-plugin-wolf

artifact:
  type: oci-image
  image: ghcr.io/rakuensoftware/smoothnas-plugin-wolf:0.2.0 # x-release-please-version

container:
  command: []
  restartPolicy: unless-stopped
  resources:
    memory: "${MEMORY_LIMIT}"

volumes:
  - name: state
    mode: tier-bound
    slot: SSD
    minSize: 100G
    bind: /etc/wolf
  - name: runtime
    mode: flat
    bind: /run/user/wolf

ports:
  - name: https
    port: 47984
    protocol: tcp
    expose: false
    hostExpose: true
  - name: http
    port: 47989
    protocol: tcp
    expose: false
    hostExpose: true
  - name: control
    port: 47999
    protocol: udp
    expose: false
    hostExpose: true
  - name: rtsp
    port: 48010
    protocol: tcp
    expose: false
    hostExpose: true
  - name: video
    port: 48100
    protocol: udp
    expose: false
    hostExpose: true
  - name: audio
    port: 48200
    protocol: udp
    expose: false
    hostExpose: true

profiles:
  - wolf-runtime
  - gpu-amd
  - default-limits

config:
  - key: MEMORY_LIMIT
    type: string
    label: Container memory
    default: 8GiB
    description: LXC memory limit for the Wolf control container.
  - key: WOLF_LOG_LEVEL
    type: select
    label: Log level
    default: INFO
    options:
      - value: ERROR
      - value: WARNING
      - value: INFO
      - value: DEBUG
      - value: TRACE
    description: Wolf server log verbosity.
  - key: WOLF_IMAGE_TAG
    type: string
    label: Image tag
    default: fedora-43
    description: Tag used for Games-on-Whales app images and the default PulseAudio helper image.
  - key: WOLF_RENDER_NODE
    type: gpu
    label: GPU
    gpuVendor: amd
    default: ''
    description: DRM render node Wolf uses for virtual desktops, vendor detection, and encoding.
  - key: WOLF_ENCODER_NODE
    type: string
    label: Encoder node
    default: ''
    description: DRM render node GStreamer uses for encoding; leave empty to use the render node.
  - key: WOLF_PULSE_IMAGE
    type: string
    label: PulseAudio image
    default: ''
    description: Full PulseAudio helper image override; leave empty to use ghcr.io/games-on-whales/pulseaudio:${WOLF_IMAGE_TAG}.
  - key: WOLF_STOP_CONTAINER_ON_EXIT
    type: select
    label: Stop apps on disconnect
    default: "TRUE"
    options:
      - value: "TRUE"
      - value: "FALSE"
    description: When TRUE, Wolf stops and removes app containers when a stream ends.
  - key: WOLF_USE_ZERO_COPY
    type: select
    label: Zero-copy video
    default: "TRUE"
    options:
      - value: "TRUE"
      - value: "FALSE"
    description: Enables Wolf's zero-copy GStreamer path.
